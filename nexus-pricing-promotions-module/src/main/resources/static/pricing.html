<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nexus Logistics | Pricing Engine</title>
<link rel="stylesheet" href="style.css">
<style>
.price-box{
    background: var(--card);
    padding:20px;
    border-radius:10px;
    margin-top:20px;
}
.form-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:20px;
}
select,input{
    width:100%;
    padding:12px;
    background:var(--bg-dark);
    border:1px solid var(--text-gray);
    color:white;
    border-radius:6px;
}
button{
    margin-top:20px;
    padding:12px 20px;
    background:var(--accent-teal);
    color:#000;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}
.result-card{
    margin-top:25px;
    background:var(--card);
    padding:25px;
    border-radius:10px;
}
.result-card h2{
    color:var(--accent-teal);
    margin:0;
}
.check-group{
    margin-top:15px;
}
.check-group label{
    display:block;
    margin:10px 0;
    color:var(--text-gray);
}
</style>
</head>

<body>

<div class="sidebar">
<img src="NexuesLogo.png" class="app-logo">

<div class="warehouse-info">
<span>PRICING SYSTEM</span>
<p>Dynamic Pricing Engine</p>
</div>

<nav>
<a href="index.html">📦 Inventory</a>
<a href="pricing.html" class="active">💰 Pricing</a>
<a href="index.html">🏷️ Suppliers</a>
<a href="index.html">📊 Analytics</a>
<a href="login.html" style="margin-top:50px;color:#ff4d4d;">🚪 Sign Out</a>
</nav>
</div>

<div class="main">

<header>
<h1>Pricing Engine</h1>
<div id="status-indicator">LIVE CALCULATION</div>
</header>

<div class="price-box">

<div class="form-row">

<div>
<label>Select Product</label>
<select id="productSelect"></select>
</div>

<div>
<label>Pricing Strategy</label>
<select id="strategy">
<option value="normal">Normal Pricing</option>
<option value="blackfriday">Black Friday</option>
<option value="vip">VIP Discount</option>
</select>
</div>

</div>

<div class="form-row">

<div>
<label>Quantity</label>
<input type="number" id="qty" value="1" min="1">
</div>

<div>
<label>Extra Options</label>

<div class="check-group">
<label><input type="checkbox" id="gift"> Gift Wrap (+50)</label>
<label><input type="checkbox" id="insurance"> Insurance (+100)</label>
</div>

</div>

</div>

<button onclick="calculatePrice()">CALCULATE FINAL PRICE</button>

<div class="result-card">
<p>Product: <span id="rName">-</span></p>
<p>Base Price: <span id="rBase">-</span></p>
<p>Final Price:</p>
<h2 id="rFinal">0.00</h2>
</div>
<div id="view-pricing" class="content-section" style="display: none">
  <div class="table-container">
    <h3>Dynamic Pricing Engine</h3>

    <div style="margin-top:20px;">
      <label>Select Product</label><br /><br />
      <select
        id="price-product"
        style="
          width:100%;
          padding:12px;
          background:#0a192f;
          color:white;
          border:1px solid #8892b0;
          border-radius:6px;
        "
      ></select>
    </div>

    <div style="margin-top:20px;">
      <label>Pricing Strategy</label><br /><br />
      <select
        id="price-strategy"
        style="
          width:100%;
          padding:12px;
          background:#0a192f;
          color:white;
          border:1px solid #8892b0;
          border-radius:6px;
        "
      >
        <option value="normal">Normal Pricing</option>
        <option value="blackfriday">Black Friday</option>
        <option value="vip">VIP Discount</option>
      </select>
    </div>

    <button
      onclick="calculatePrice()"
      style="
        margin-top:25px;
        padding:12px 20px;
        background:#64ffda;
        border:none;
        font-weight:bold;
        border-radius:6px;
        cursor:pointer;
      "
    >
      Calculate Final Price
    </button>

    <div class="stat-box" style="margin-top:25px;">
      <small>FINAL CALCULATED PRICE</small>
      <h2 id="final-price">0.00</h2>
      <p id="price-product-name"></p>
    </div>
  </div>
</div>
</div>

</div>

<script>

let products = [];

async function loadProducts(){

    const res = await fetch('/api/inventory/list');
    const data = await res.json();

    products = data;

    document.getElementById("productSelect").innerHTML =
        data.map(p =>
            `<option value="${p.id}">
                ${p.name} ($${p.price})
            </option>`
        ).join('');
}

async function calculatePrice(){

    const id = document.getElementById("productSelect").value;

    const res = await fetch('/api/pricing/calculate/' + id);

    const finalPrice = await res.text();

    const product = products.find(p => p.id === id);

    document.getElementById("rName").innerText = product.name;
    document.getElementById("rBase").innerText = product.price;
    document.getElementById("rFinal").innerText = finalPrice;
}

loadProducts();

</script>

</body>
</html>
